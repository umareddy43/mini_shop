name: grocery_shop_app
description: "Offline-first Grocery Shop Khata & Order Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # State management
  flutter_riverpod: ^2.5.1

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Formatting
  intl: ^0.19.0

  # PDF bill generation & printing/sharing
  pdf: ^3.11.1
  printing: ^5.13.1

  # Sharing statements / receipts
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
